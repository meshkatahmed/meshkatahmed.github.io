<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/skeleton/2.0.4/skeleton.css"/>
    <title>Shopping Cart</title>
</head>
<body>
    <div align="center" class="container">
        <h4>Prodict List</h4>
        <hr>
        <table class="product">
            <thead class="product-head">
                <tr>
                    <th>Sl. No.</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody class="product-body">
                <tr>
                    <td>01</td>
                    <td>TV</td>
                    <td>25,000 tk.</td>
                    <td><button id="add-to-cart">Add to cart</button></td>
                </tr>
                <tr>
                    <td>02</td>
                    <td>Refrigerator</td>
                    <td>35,000 tk.</td>
                    <td><button id="add-to-cart">Add to cart</button></td>
                </tr>
                <tr>
                    <td>03</td>
                    <td>Printer</td>
                    <td>15,000 tk.</td>
                    <td><button id="add-to-cart">Add to cart</button></td>
                </tr>
                <tr>
                    <td>04</td>
                    <td>Scanner</td>
                    <td>10,000 tk.</td>
                    <td><button id="add-to-cart">Add to cart</button></td>
                </tr>
            </tbody>
        </table>
    </div>
    <br>
    <br>
    <div align="center" class="container">
        <h4>Shopping Cart</h4>
        <hr>
        <table class="cart">
            <thead class="cart-head">
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody class="cart-body">
                
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
